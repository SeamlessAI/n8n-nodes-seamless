name: Validate MCP Tool Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1' # Weekly on Monday at 9am UTC

jobs:
  validate-tools:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build toolMapping
        run: npx tsc --outDir tmp-build --declaration false

      - name: Validate MCP tool catalog
        env:
          MCP_BASE_URL: ${{ secrets.MCP_BASE_URL }}
          MCP_API_KEY: ${{ secrets.MCP_API_KEY }}
        run: node scripts/validate-mcp-tools.mjs
